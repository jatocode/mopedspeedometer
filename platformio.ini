[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv

; OTA support – uncomment to enable ArduinoOTA (costs ~20-40 KB flash)
; build_flags = -D ENABLE_OTA

; Serial monitor baud rate (matches Serial.begin in main.cpp)
monitor_speed = 115200

; Libraries – fetched automatically by PlatformIO
; BLE is built into the ESP32 Arduino Core (no extra entry needed)
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3

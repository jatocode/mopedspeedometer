<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MopedSpeedo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 { font-size: 1.2rem; letter-spacing: 0.15em; color: #888; margin-bottom: 24px; }

    #speed-display {
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      letter-spacing: -4px;
    }

    #speed-unit { font-size: 1.4rem; color: #888; margin-bottom: 32px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 32px;
    }

    .tile {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .tile .label { font-size: 0.7rem; letter-spacing: 0.1em; color: #666; text-transform: uppercase; margin-bottom: 6px; }
    .tile .value { font-size: 1.8rem; font-weight: 600; color: #fff; }
    .tile .unit  { font-size: 0.75rem; color: #666; }

    #fix-indicator {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
      vertical-align: middle;
    }
    #fix-indicator.fix    { background: #4caf50; }
    #fix-indicator.no-fix { background: #f44336; }

    .aux-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .aux-row label { font-size: 0.85rem; color: #888; }

    .toggle { position: relative; width: 48px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0;
      background: #333; border-radius: 26px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #4caf50; }
    .toggle input:checked + .slider::before { transform: translateX(22px); }

    button {
      padding: 12px 32px;
      font-size: 1rem; font-weight: 600;
      border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    #connect-btn { background: #2196f3; color: #fff; }
    #connect-btn:hover { background: #1976d2; }
    #connect-btn:disabled { opacity: 0.4; cursor: default; }

    #status { margin-top: 16px; font-size: 0.8rem; color: #555; min-height: 1.2em; }
  </style>
</head>
<body>

  <h1>MOPED SPEEDO</h1>

  <div id="speed-display">--</div>
  <div id="speed-unit">km/h</div>

  <div class="grid">
    <div class="tile">
      <div class="label">Heading</div>
      <div class="value" id="heading">--</div>
      <div class="unit">degrees</div>
    </div>
    <div class="tile">
      <div class="label">Altitude</div>
      <div class="value" id="altitude">--</div>
      <div class="unit">metres</div>
    </div>
    <div class="tile">
      <div class="label">Satellites</div>
      <div class="value" id="satellites">--</div>
    </div>
    <div class="tile">
      <div class="label">GPS Fix</div>
      <div class="value">
        <span id="fix-indicator"></span>
        <span id="fix-text">--</span>
      </div>
    </div>
    <div class="tile" style="grid-column: span 2;">
      <div class="label">WiFi IP</div>
      <div class="value" id="ip-address" style="font-size:1.2rem;">--</div>
    </div>
  </div>

  <div class="aux-row">
    <label for="aux-toggle">Aux Output</label>
    <label class="toggle">
      <input type="checkbox" id="aux-toggle" disabled>
      <span class="slider"></span>
    </label>
  </div>

  <button id="connect-btn">Connect via Bluetooth</button>
  <div id="status">Web Bluetooth requires Chrome on Android/desktop.</div>

<script>
  const SERVICE_UUID   = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
  const CHR_SPEED      = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
  const CHR_HEADING    = 'beb5483f-36e1-4688-b7f5-ea07361b26a8';
  const CHR_ALTITUDE   = 'beb54840-36e1-4688-b7f5-ea07361b26a8';
  const CHR_SATELLITES = 'beb54841-36e1-4688-b7f5-ea07361b26a8';
  const CHR_FIX_STATUS = 'beb54842-36e1-4688-b7f5-ea07361b26a8';
  const CHR_AUX_OUTPUT = 'beb54843-36e1-4688-b7f5-ea07361b26a8';
  const CHR_IP_ADDRESS = 'beb54844-36e1-4688-b7f5-ea07361b26a8';

  const btn       = document.getElementById('connect-btn');
  const statusEl  = document.getElementById('status');
  const auxToggle = document.getElementById('aux-toggle');

  let chrAux = null;
  let ignoreAuxNotify = false;

  const readFloat = e => new DataView(e.target.value.buffer).getFloat32(0, true);
  const readUint8 = e => new DataView(e.target.value.buffer).getUint8(0);

  // macOS Chrome: getCharacteristic(uuid) throws "Not supported" for 128-bit
  // UUIDs. Fetch all characteristics once and look up by UUID in the result.
  async function getAllCharacteristics(service) {
    const all = await service.getCharacteristics();
    console.log('Characteristics found:', all.map(c => c.uuid));
    return new Map(all.map(c => [c.uuid, c]));
  }

  async function subscribeNotify(chars, uuid, handler) {
    const chr = chars.get(uuid);
    if (!chr) throw new Error(`Characteristic ${uuid} not found`);
    chr.addEventListener('characteristicvaluechanged', handler);
    await chr.startNotifications();
    return chr;
  }

  btn.addEventListener('click', async () => {
    if (!navigator.bluetooth) {
      statusEl.textContent = 'Web Bluetooth not supported in this browser.';
      return;
    }
    btn.disabled = true;
    statusEl.textContent = 'Scanning…';
    console.log('Scanning…');

    try {
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [SERVICE_UUID]
      });

      statusEl.textContent = 'Connecting…';
      console.log('Connecting…');
      device.addEventListener('gattserverdisconnected', () => {
        statusEl.textContent = 'Disconnected.';
        btn.textContent = 'Reconnect';
        btn.disabled = false;
        auxToggle.disabled = true;
      });

      const connectWithTimeout = () => Promise.race([
        device.gatt.connect(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('connect timeout')), 6000))
      ]);

      let server;
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          statusEl.textContent = attempt === 1 ? 'Connecting…' : `Connecting… (attempt ${attempt})`;
          console.log(`gatt.connect attempt ${attempt}`);
          server = await connectWithTimeout();
          console.log('gatt.connect OK');
          break;
        } catch (e) {
          console.warn(`gatt.connect attempt ${attempt} failed:`, e.message);
          if (attempt === 3) throw new Error(`Could not connect after 3 attempts: ${e.message}`);
          await new Promise(r => setTimeout(r, 1500));
        }
      }
      // macOS Chrome CoreBluetooth bug: getPrimaryService(uuid) throws
      // "Not supported" for 128-bit UUIDs. The only reliable workaround is
      // getPrimaryServices() (no argument) then find by UUID in the result.
      statusEl.textContent = 'Discovering services…';
      console.log('Discovering services…');
      let service;
      const allServices = await Promise.race([
        server.getPrimaryServices(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('discovery timeout')), 10000))
      ]);
      console.log('Services found:', allServices.map(s => s.uuid));
      service = allServices.find(s => s.uuid === SERVICE_UUID);
      if (!service) {
        throw new Error(`Service ${SERVICE_UUID} not found. Found: ${allServices.map(s => s.uuid).join(', ')}`);
      }

      statusEl.textContent = 'Reading characteristics…';
      const chars = await getAllCharacteristics(service);

      await subscribeNotify(chars, CHR_SPEED, e => {
        document.getElementById('speed-display').textContent = readFloat(e).toFixed(1);
      });
      await subscribeNotify(chars, CHR_HEADING, e => {
        document.getElementById('heading').textContent = readFloat(e).toFixed(0) + '°';
      });
      await subscribeNotify(chars, CHR_ALTITUDE, e => {
        document.getElementById('altitude').textContent = readFloat(e).toFixed(0);
      });
      await subscribeNotify(chars, CHR_SATELLITES, e => {
        document.getElementById('satellites').textContent = readUint8(e);
      });
      await subscribeNotify(chars, CHR_FIX_STATUS, e => {
        const fix = readUint8(e);
        document.getElementById('fix-indicator').className = fix ? 'fix' : 'no-fix';
        document.getElementById('fix-text').textContent    = fix ? 'Fix' : 'No fix';
      });

      // IP address — UTF-8 string, read once + notify on change
      const chrIp = chars.get(CHR_IP_ADDRESS);
      if (chrIp) {
        const updateIp = val => {
          document.getElementById('ip-address').textContent =
            new TextDecoder().decode(val.target ? val.target.value : val);
        };
        const initIp = await chrIp.readValue();
        document.getElementById('ip-address').textContent =
          new TextDecoder().decode(initIp);
        chrIp.addEventListener('characteristicvaluechanged', updateIp);
        await chrIp.startNotifications();
      }

      // AUX — read initial state, then subscribe
      chrAux = chars.get(CHR_AUX_OUTPUT);
      if (!chrAux) throw new Error(`AUX characteristic ${CHR_AUX_OUTPUT} not found`);
      const initVal = await chrAux.readValue();
      auxToggle.checked = new DataView(initVal.buffer).getUint8(0) === 1;
      chrAux.addEventListener('characteristicvaluechanged', e => {
        if (ignoreAuxNotify) { ignoreAuxNotify = false; return; }
        auxToggle.checked = readUint8(e) === 1;
      });
      await chrAux.startNotifications();
      auxToggle.disabled = false;

      statusEl.textContent = `Connected to ${device.name}`;
      btn.textContent = 'Connected';

    } catch (err) {
      statusEl.textContent = `Error: ${err.message}`;
      btn.disabled = false;
    }
  });

  auxToggle.addEventListener('change', async () => {
    if (!chrAux) return;
    ignoreAuxNotify = true;
    try {
      await chrAux.writeValue(new Uint8Array([auxToggle.checked ? 1 : 0]));
    } catch (err) {
      statusEl.textContent = `AUX write error: ${err.message}`;
      ignoreAuxNotify = false;
    }
  });
</script>
</body>
</html>
